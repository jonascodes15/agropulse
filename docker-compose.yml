services:
  # --- Ingestion ----------------------------------------------------------
  kafka:
    image: redpandadata/redpanda:latest
    command: >
      redpanda start --overprovisioned --smp 1 --memory 512M
      --reserve-memory 0M --node-id 0 --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  producer:
    build: ./producer
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka

  # --- Processing -----------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: agropulse
      POSTGRES_USER: agropulse
      POSTGRES_PASSWORD: agropulse
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  consumer:
    build: ./consumer
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgresql://agropulse:agropulse@postgres:5432/agropulse
    depends_on:
      - kafka
      - postgres

  # --- Serving --------------------------------------------------------------
  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://agropulse:agropulse@postgres:5432/agropulse
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  # --- Batch ------------------------------------------------------------------
  # Runs Airflow in "standalone" mode (webserver + scheduler + its own
  # SQLite metadata DB in one process) — deliberately lightweight for local
  # dev. A real deployment would use LocalExecutor/CeleryExecutor with its
  # own dedicated metadata Postgres instead.
  airflow:
    image: apache/airflow:2.9.0
    command: standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
